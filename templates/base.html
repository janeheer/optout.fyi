<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page_title or "optout.fyi — Your Digital Data Red Card" }}</title>
  <meta
    name="description"
    content="{{ page_description or 'Your digital data red card. Generate legally-grounded CCPA/CPRA privacy rights letters demanding AI surveillance companies delete, disclose, and stop selling your data. No data collected.' }}"
  >
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{ page_title or 'optout.fyi — Your Digital Data Red Card' }}">
  <meta property="og:description" content="{{ page_description or 'Your digital data red card. Generate legally-grounded CCPA/CPRA privacy rights letters demanding AI surveillance companies delete, disclose, and stop selling your data. No data collected.' }}">
  <meta property="og:image" content="{{ og_image_url or 'https://optout.fyi/static/og-card.png' }}">
  <meta property="og:image:alt" content="optout.fyi share card for the immigrant data rights tool">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page_title or 'optout.fyi — Your Digital Data Red Card' }}">
  <meta name="twitter:description" content="{{ page_description or 'Your digital data red card. Generate legally-grounded CCPA/CPRA privacy rights letters demanding AI surveillance companies delete, disclose, and stop selling your data. No data collected.' }}">
  <meta name="twitter:image" content="{{ og_image_url or 'https://optout.fyi/static/og-card.png' }}">
  <link rel="icon" href="{{ url_for('static', filename='favicon.svg') }}" type="image/svg+xml">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          fontFamily: {
            sans: ["Inter", "system-ui", "sans-serif"],
            mono: ["ui-monospace", "SFMono-Regular", "monospace"]
          },
          colors: {
            page: "#0c1220",
            ink: "#c8dce8",
            muted: "#8ba3b9",
            panel: "#162032",
            line: "#1e3048",
            card: "#b91c1c",
            ice: "#4a8ab8",
            glow: "#a0cce0",
            spark: "#d4842a"
          }
        }
      }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  >
  <style>
    body {
      background: #0c1220;
      color: #c8dce8;
    }

    .prose-copy p,
    .prose-copy li {
      color: #8ba3b9;
    }

    .prose-copy strong {
      color: #c8dce8;
    }

    .hidden-panel {
      display: none;
    }

    input[type="checkbox"] {
      accent-color: #4a8ab8;
    }

    button,
    input:not([type="checkbox"]):not([type="radio"]),
    select,
    summary {
      min-height: 44px;
    }

    ::selection {
      background: #4a8ab8;
      color: #ffffff;
    }

    *:focus-visible {
      outline: 2px solid #4a8ab8;
      outline-offset: 2px;
    }

    /* Section nav pills */
    .section-nav {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid #1e3048;
    }
    .section-nav a {
      padding: 0.4rem 0.9rem;
      border-radius: 9999px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #8ba3b9;
      border: 1px solid #1e3048;
      transition: all 0.15s;
      min-height: 44px;
    }
    .section-nav a:hover {
      color: #c8dce8;
      border-color: #4a8ab8;
      background: rgba(74,138,184,0.1);
    }

    /* Red card motif */
    .red-card {
      background: #dc2626;
      border-radius: 12px;
      color: white;
    }

    .red-card-outline {
      border: 2px solid #dc2626;
      border-radius: 12px;
    }

    @media (max-width: 639px) {
      .section-nav {
        flex-wrap: nowrap;
        overflow-x: auto;
        padding-bottom: 0.75rem;
        scroll-snap-type: x proximity;
      }

      .section-nav a {
        flex: 0 0 auto;
        scroll-snap-align: start;
        white-space: nowrap;
      }

      .mobile-bottom-nav {
        position: fixed;
        left: 0.75rem;
        right: 0.75rem;
        bottom: calc(env(safe-area-inset-bottom, 0px) + 0.75rem);
        z-index: 40;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.5rem;
        padding: 0.5rem;
        border: 1px solid rgba(30, 48, 72, 0.95);
        border-radius: 1rem;
        background: rgba(12, 18, 32, 0.94);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.32);
        backdrop-filter: blur(14px);
      }

      .mobile-bottom-nav a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0.7rem 0.9rem;
        border-radius: 0.8rem;
        border: 1px solid transparent;
        color: #c8dce8;
        font-size: 0.82rem;
        font-weight: 600;
        line-height: 1.1;
        background: rgba(22, 32, 50, 0.72);
        transition: all 0.15s ease;
      }

      .mobile-bottom-nav a:hover,
      .mobile-bottom-nav a:focus-visible {
        border-color: rgba(74, 138, 184, 0.8);
        background: rgba(74, 138, 184, 0.14);
        color: #ffffff;
      }
    }

    @media print {
      @page {
        margin: 0.75in;
      }

      html,
      body {
        background: #ffffff !important;
        color: #000000 !important;
      }

      body {
        font-size: 12pt;
        print-color-adjust: exact;
        -webkit-print-color-adjust: exact;
      }

      body.print-letter-ready .h-1,
      body.print-letter-ready header,
      body.print-letter-ready footer,
      body.print-letter-ready .mobile-bottom-nav,
      body.print-letter-ready [href="#main"],
      body.print-letter-ready #language-picker,
      body.print-letter-ready #red-card-shell,
      body.print-letter-ready #explanation-panel,
      body.print-letter-ready #how-it-works-panel,
      body.print-letter-ready #countdown-panel,
      body.print-letter-ready #overdue-panel,
      body.print-letter-ready #company-reference-tooltip {
        display: none !important;
      }

      body.print-letter-ready #main,
      body.print-letter-ready #main > div {
        max-width: none !important;
        margin: 0 !important;
        padding: 0 !important;
      }

      body.print-letter-ready #generator > :not(#letter-output) {
        display: none !important;
      }

      body.print-letter-ready #letter-output {
        display: block !important;
        border: 0 !important;
        margin: 0 !important;
        padding: 0 !important;
      }

      body.print-letter-ready #letter-output > :not(#print-letter-sheet) {
        display: none !important;
      }

      body.print-letter-ready #print-letter-sheet {
        display: block !important;
        margin: 0 !important;
        padding: 0 !important;
        border: 0 !important;
        background: transparent !important;
        color: #000000 !important;
        white-space: pre-wrap;
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        font-size: 12pt;
        line-height: 1.6;
      }
    }
  </style>
  {% block head %}{% endblock %}
  <script>
    // Prevent header/footer flash on reload when countdown is active
    try {
      if (JSON.parse(localStorage.getItem("optout_sent") || "null")) {
        document.documentElement.classList.add("has-active-countdown");
      }
    } catch (_e) {}
  </script>
  <style>
    .has-active-countdown header,
    .has-active-countdown footer,
    .has-active-countdown .h-1,
    .has-active-countdown .mobile-bottom-nav {
      display: none !important;
    }
  </style>
</head>
<body class="min-h-screen font-sans antialiased">
  <a
    href="#main"
    data-i18n="skip_to_main"
    class="sr-only focus:not-sr-only focus:absolute focus:left-4 focus:top-4 focus:z-50 focus:rounded focus:bg-red-600 focus:px-3 focus:py-2 focus:text-sm focus:text-ink"
  >
    Skip to main content
  </a>

  <!-- Red stripe at top — homage to the red card -->
  <div class="h-1 bg-gradient-to-r from-card via-spark to-ice"></div>

  <div class="min-h-screen">
    <header class="border-b border-line">
      <div class="mx-auto flex {{ page_shell_class or 'max-w-3xl' }} flex-col gap-3 px-4 py-4 sm:flex-row sm:items-center sm:justify-between sm:px-5">
        <a href="/" class="text-xl font-bold tracking-tight text-ink">optout.fyi</a>
        <nav class="flex flex-wrap items-center gap-x-4 gap-y-2 text-sm text-muted">
          <a href="/" data-i18n="nav_letter" class="transition hover:text-ice">Letter</a>
          <a href="/guide" data-i18n="nav_guide" class="transition hover:text-ice">Guide</a>
          <a href="/resources" data-i18n="nav_resources" class="transition hover:text-ice">Resources</a>
        </nav>
      </div>
    </header>

    <main id="main" class="pb-24 sm:pb-0">
      <div class="mx-auto {{ page_shell_class or 'max-w-3xl' }} px-4 py-8 sm:px-5 sm:py-14">
        {% block content %}{% endblock %}
      </div>
    </main>

    <footer class="border-t border-line">
      <div class="mx-auto {{ page_shell_class or 'max-w-3xl' }} px-5 py-8">
            <div class="flex flex-col gap-2 text-sm text-muted sm:flex-row sm:items-center sm:justify-between">
              <p data-i18n-footer>Zero data collected. Everything runs in your browser.</p>
              <p class="text-xs text-muted/60">
               <span data-i18n-footer-tagline>A tool for those who need it most.</span>
               <a data-i18n="footer_contact" class="underline hover:text-ice" href="https://t.me/drakina" target="_blank" rel="noopener noreferrer">Contact</a>.
               <a data-i18n="footer_source" class="underline hover:text-ice" href="https://github.com/janeheer/optout.fyi" target="_blank" rel="noopener noreferrer">Source</a>.
              </p>
            </div>
      </div>
    </footer>

    <nav aria-label="Primary" class="mobile-bottom-nav sm:hidden">
      <a href="/" data-i18n="nav_letter">Letter</a>
      <a href="/guide" data-i18n="nav_guide">Guide</a>
      <a href="/resources" data-i18n="nav_resources">Resources</a>
    </nav>
  </div>

  <script src="{{ url_for('static', filename='js/data.js') }}"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
